<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seri Maia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow-x: hidden;
    }.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 12px;
  height: 100vh;
  padding: 12px;
}

.tile {
  background: #fff;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.4s ease-in-out;
}

.tile:hover {
  background: #000;
  color: #fff;
  transform: scale(1.03);
}

.center {
  grid-column: 2 / span 2;
  grid-row: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  letter-spacing: 12px;
  font-weight: 300;
}

/* Asymmetry */
.about { grid-column: 1; grid-row: 1; }
.skills { grid-column: 2; grid-row: 1; }
.project { grid-column: 1; grid-row: 2; }
.experience { grid-column: 4; grid-row: 2; }
.education { grid-column: 1 / span 2; grid-row: 3; }
.contact { grid-column: 3 / span 2; grid-row: 3; }

/* Overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  color: #fff;
  display: none;
  flex-direction: column;
  padding: 40px;
  opacity: 0;
  transition: opacity 0.4s ease-in-out;
}

.overlay.active {
  display: flex;
  opacity: 1;
}

.back {
  cursor: pointer;
  margin-bottom: 40px;
  font-size: 12px;
  letter-spacing: 2px;
}

.content {
  max-width: 600px;
  line-height: 1.6;
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    height: auto;
  }
  .center {
    order: -1;
    padding: 40px 0;
  }
}

  </style>
</head>
<body><div class="grid">
  <div class="tile about" data-section="ABOUT">ABOUT</div>
  <div class="tile skills" data-section="SKILLS">SKILLS</div>
  <div class="tile project" data-section="PROJECT">PROJECT</div>  <div class="center">SERI MAIA</div>  <div class="tile experience" data-section="EXPERIENCE">EXPERIENCE</div>
  <div class="tile education" data-section="EDUCATION">EDUCATION</div>
  <div class="tile contact" data-section="CONTACT">CONTACT</div>
</div><div class="overlay" id="overlay">
  <div class="back" id="back">← BACK</div>
  <div class="content" id="content"></div>
</div><script>
  const tiles = document.querySelectorAll('.tile');
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('content');
  const back = document.getElementById('back');

  const data = {
    ABOUT: 'Programmer specializing in system development and citizen developer enablement.',
    SKILLS: 'Mendix, .NET, PostgreSQL, JavaScript, system design, automation.',
    PROJECT: 'Financial Budget System, Dashboard Reporting, eForms enhancements.',
    EXPERIENCE: 'IT Department, handling enterprise systems and internal tools.',
    EDUCATION: 'Relevant academic background in computing and software development.',
    CONTACT: 'Email: your@email.com | LinkedIn: yourprofile'
  };

  tiles.forEach(tile => {
    tile.addEventListener('click', () => {
      const section = tile.dataset.section;
      content.innerHTML = `<h2>${section}</h2><br><p>${data[section]}</p>`;
      overlay.classList.add('active');
    });
  });

  back.addEventListener('click', () => {
    overlay.classList.remove('active');
  });
</script></body>
</html>
